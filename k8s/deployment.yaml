apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-sso-service
  labels:
    app: auth-sso-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-sso-service
  template:
    metadata:
      labels:
        app: auth-sso-service
    spec:
      containers:
      - name: auth-sso-service
        image: 654654435115.dkr.ecr.ap-south-1.amazonaws.com/auth-sso-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: SECRET_KEY
          value: "your-secret-key-change-in-production"
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5